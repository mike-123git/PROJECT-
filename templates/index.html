<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nani ke Nushke – Home Remedy Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

    <style>
        /* ── TOKENS ─────────────────────────────────────── */
        :root {
            --saffron:   #D4620E;
            --gold:      #C8930A;
            --turmeric:  #F0C040;
            --leaf:      #3A6B42;
            --leaf-mid:  #528858;
            --leaf-pale: #EBF3EC;
            --cream:     #FDFAF3;
            --parchment: #F7F2E8;
            --brown:     #3D2B1F;
            --brown-mid: #7A5235;
            --border:    rgba(200,147,10,0.18);
            --shadow-sm: 0 2px 12px rgba(61,43,31,0.08);
            --shadow-md: 0 6px 28px rgba(61,43,31,0.12);
            --r-card:    16px;
            --r-pill:    999px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--parchment);
            color: var(--brown);
            overflow: hidden;
        }

        /* ── PAGE SWITCHER ──────────────────────────────── */
        .page { display: none; height: 100vh; overflow: hidden; }
        .page.active { display: flex; }

        /* ═══════════════════════════════════════════════════
           CHAT PAGE
        ═══════════════════════════════════════════════════ */
        #chat { flex-direction: column; background: var(--cream); }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: #fff;
            border-bottom: 1px solid rgba(200,147,10,0.15);
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
            z-index: 10;
        }

        .bot-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--leaf) 0%, var(--leaf-mid) 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 3px 10px rgba(58,107,66,0.3);
            flex-shrink: 0;
        }

        .bot-info { flex: 1; }
        .bot-name { font-size: 15px; font-weight: 600; color: var(--brown); }
        .bot-status { font-size: 12px; color: var(--leaf); display: flex; align-items: center; gap: 5px; }
        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #4CAF50;
            box-shadow: 0 0 0 2px rgba(76,175,80,0.25);
        }

        .remedy-count-badge {
            padding: 5px 13px;
            border-radius: var(--r-pill);
            border: 1.5px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            color: var(--brown-mid);
            background: var(--parchment);
            white-space: nowrap;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-body::-webkit-scrollbar { width: 5px; }
        .chat-body::-webkit-scrollbar-thumb { background: rgba(200,147,10,0.2); border-radius: 10px; }

        /* Welcome state */
        .welcome-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            padding: 20px;
            gap: 14px;
            animation: fadeUp .4s ease both;
        }
        .welcome-state .w-icon { font-size: 52px; }
        .welcome-state h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 22px;
            color: var(--brown);
        }
        .welcome-state p { font-size: 13.5px; color: var(--brown-mid); max-width: 340px; line-height: 1.6; }

        /* Chips */
        .chips-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            padding: 0 8px;
        }
        .chip {
            padding: 8px 16px;
            border-radius: var(--r-pill);
            border: 1.5px solid var(--border);
            background: #fff;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            color: var(--brown);
            cursor: pointer;
            transition: background .15s, border-color .15s, transform .1s;
            white-space: nowrap;
        }
        .chip:hover { background: var(--leaf-pale); border-color: var(--leaf-mid); color: var(--leaf); transform: translateY(-1px); }

        /* Message rows */
        .msg-row { display: flex; align-items: flex-end; gap: 10px; animation: popIn .3s cubic-bezier(.34,1.56,.64,1) both; }
        .msg-row.user { justify-content: flex-end; }
        .msg-row.bot  { justify-content: flex-start; }

        .msg-avatar {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--leaf), var(--leaf-mid));
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        /* User bubble */
        .user-bubble {
            background: var(--leaf);
            color: #fff;
            padding: 11px 16px;
            border-radius: 20px;
            border-bottom-right-radius: 5px;
            font-size: 14px;
            line-height: 1.55;
            max-width: 68%;
            box-shadow: 0 2px 8px rgba(58,107,66,0.25);
        }

        /* Remedy card */
        .remedy-card {
            background: #fff;
            border-radius: var(--r-card);
            border: 1px solid rgba(200,147,10,0.2);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px 12px;
            border-bottom: 1px solid var(--leaf-pale);
        }

        .card-emoji {
            font-size: 26px;
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            background: var(--leaf-pale);
            border-radius: 12px;
            flex-shrink: 0;
        }

        .card-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--leaf);
            margin-bottom: 3px;
        }

        .card-title {
            font-family: 'DM Serif Display', serif;
            font-size: 17px;
            color: var(--brown);
            line-height: 1.2;
        }

        .card-body {
            padding: 14px 18px;
            font-size: 13.5px;
            color: var(--brown);
            line-height: 1.65;
        }

        .card-redflag {
            margin: 0 18px 16px;
            border-left: 3px solid var(--saffron);
            padding: 10px 14px;
            background: #FFF6F0;
            border-radius: 0 10px 10px 0;
            font-size: 12.5px;
            color: var(--brown-mid);
            line-height: 1.55;
        }

        .card-redflag .rf-title {
            font-weight: 600;
            color: var(--saffron);
            margin-bottom: 3px;
            display: flex; align-items: center; gap: 5px;
        }

        /* Plain bot bubble */
        .plain-bubble {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 18px;
            border-bottom-left-radius: 5px;
            padding: 12px 16px;
            font-size: 13.5px;
            color: var(--brown);
            line-height: 1.6;
            max-width: 72%;
            box-shadow: var(--shadow-sm);
        }

        /* Emergency bubble */
        .emergency-bubble {
            background: #FFF0EE;
            border: 1.5px solid #EF5350;
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 13.5px;
            color: #B71C1C;
            line-height: 1.6;
            max-width: 72%;
        }

        /* Typing dots */
        .typing-wrap { display: flex; align-items: center; gap: 10px; animation: popIn .3s ease both; }
        .typing-dots {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 18px;
            border-bottom-left-radius: 5px;
            padding: 12px 16px;
            display: flex; gap: 5px; align-items: center;
            box-shadow: var(--shadow-sm);
        }
        .typing-dots span {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--gold);
            animation: bounce 1.1s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: .18s; }
        .typing-dots span:nth-child(3) { animation-delay: .36s; }

        /* Input bar */
        .chat-input-area {
            padding: 12px 16px;
            background: #fff;
            border-top: 1px solid rgba(200,147,10,0.12);
            display: flex; align-items: center; gap: 10px;
            flex-shrink: 0;
        }

        .input-field {
            flex: 1;
            padding: 13px 18px;
            border-radius: var(--r-pill);
            border: 1.5px solid var(--border);
            background: var(--parchment);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--brown);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .input-field:focus { border-color: var(--leaf-mid); box-shadow: 0 0 0 3px rgba(58,107,66,0.1); background: #fff; }
        .input-field::placeholder { color: rgba(61,43,31,0.38); }

        .send-btn {
            width: 46px; height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--leaf), var(--leaf-mid));
            border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 3px 12px rgba(58,107,66,0.35);
            transition: transform .15s, box-shadow .15s;
            flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 18px rgba(58,107,66,0.4); }
        .send-btn:active { transform: scale(0.94); }
        .send-btn svg { width: 18px; height: 18px; fill: #fff; }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(.88) translateY(6px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-5px); }
        }

        @media (max-width: 480px) {
            .remedy-card { max-width: 100%; }
            .plain-bubble, .emergency-bubble { max-width: 86%; }
        }
    </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     CHAT PAGE
═══════════════════════════════════════════════ -->
<div id="chat" class="page active">

    <div class="chat-header">
        <div class="bot-avatar">🌿</div>
        <div class="bot-info">
            <div class="bot-name">Nani ke Nushke</div>
            <div class="bot-status">
                <span class="status-dot"></span>
                Traditional Remedies
            </div>
        </div>
        <div class="remedy-count-badge">100+ Remedies</div>
    </div>

    <div class="chat-body" id="chatBody">
        <div class="welcome-state" id="welcomeState">
            <div class="w-icon">🙏</div>
            <h2>Namaste! I'm your remedy guide</h2>
            <p>Describe your health problem  and I'll suggest safe, traditional home remedies.</p>
            <div class="chips-row">
                <button class="chip" onclick="sendChip(this)">I have a headache</button>
                <button class="chip" onclick="sendChip(this)">Sore throat</button>
                <button class="chip" onclick="sendChip(this)">Upset stomach</button>
                <button class="chip" onclick="sendChip(this)">Can't sleep</button>
                <button class="chip" onclick="sendChip(this)">Hair is falling</button>
                <button class="chip" onclick="sendChip(this)">Acne breakout</button>
                <button class="chip" onclick="sendChip(this)">Dandruff</button>
            </div>
        </div>
    </div>

    <div class="chat-input-area">
        <input
            type="text"
            class="input-field"
            id="userInput"
            placeholder="Describe your health problem… (e.g. 'my head is hurting since morning')"
            autocomplete="off"
        />
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
            <svg viewBox="0 0 24 24"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

</div>


<script>
    // ─────────────────────────────────────────────────────
    //  Condition display metadata (name + emoji for cards)
    // ─────────────────────────────────────────────────────
    const conditionMeta = {
        "cough":        { name: "Dry Cough",          emoji: "🫁" },
        "cold":         { name: "Common Cold",         emoji: "🤧" },
        "fever":        { name: "Fever",               emoji: "🌡️" },
        "headache":     { name: "Tension Headache",    emoji: "🤕" },
        "head":         { name: "Tension Headache",    emoji: "🤕" },
        "sore throat":  { name: "Sore Throat",         emoji: "🫂" },
        "throat":       { name: "Sore Throat",         emoji: "🫂" },
        "stomach pain": { name: "Stomach Pain",        emoji: "🫃" },
        "stomach":      { name: "Stomach Discomfort",  emoji: "🫃" },
        "acidity":      { name: "Acidity",             emoji: "🥛" },
        "nausea":       { name: "Nausea",              emoji: "🤢" },
        "vomit":        { name: "Vomiting",            emoji: "🤢" },
        "diarrhea":     { name: "Diarrhea",            emoji: "💧" },
        "loose motion": { name: "Loose Motion",        emoji: "💧" },
        "constipation": { name: "Constipation",        emoji: "🌾" },
        "indigestion":  { name: "Indigestion",         emoji: "🌿" },
        "gas":          { name: "Gas / Bloating",      emoji: "🌿" },
        "bloating":     { name: "Bloating",            emoji: "🌿" },
        "muscle pain":  { name: "Muscle Pain",         emoji: "💪" },
        "joint pain":   { name: "Joint Pain",          emoji: "🦴" },
        "joint":        { name: "Joint Pain",          emoji: "🦴" },
        "back pain":    { name: "Back Pain",           emoji: "🛁" },
        "back":         { name: "Back Pain",           emoji: "🛁" },
        "toothache":    { name: "Toothache",           emoji: "🦷" },
        "tooth":        { name: "Toothache",           emoji: "🦷" },
        "earache":      { name: "Earache",             emoji: "👂" },
        "ear":          { name: "Earache",             emoji: "👂" },
        "insomnia":     { name: "Insomnia",            emoji: "🌙" },
        "sleep":        { name: "Sleep Trouble",       emoji: "🌙" },
        "acne":         { name: "Acne",                emoji: "✨" },
        "pimple":       { name: "Pimples",             emoji: "✨" },
        "dandruff":     { name: "Dandruff",            emoji: "🍎" },
        "hair fall":    { name: "Hair Fall",           emoji: "🥥" },
        "hair":         { name: "Hair Fall",           emoji: "🥥" },
        "sunburn":      { name: "Sunburn",             emoji: "☀️" },
        "insect bite":  { name: "Insect Bite",         emoji: "🐝" },
        "mouth ulcer":  { name: "Mouth Ulcer",         emoji: "🍯" },
        "ulcer":        { name: "Mouth Ulcer",         emoji: "🍯" },
        "skin":         { name: "Skin Irritation",     emoji: "🌿" },
        "rash":         { name: "Skin Rash",           emoji: "🌿" },
        "eye":          { name: "Eye Discomfort",      emoji: "👁️" },
    };

    let conversationState = "normal";
    const chatBody = document.getElementById("chatBody");

    // ── Hide welcome state on first message ──
    function hideWelcome() {
        const ws = document.getElementById("welcomeState");
        if (ws) ws.style.display = "none";
    }

    function scrollBottom() { chatBody.scrollTop = chatBody.scrollHeight; }

    function escHtml(s) {
        return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // ── Append user bubble ──
    function appendUser(text) {
        hideWelcome();
        const row = document.createElement("div");
        row.className = "msg-row user";
        row.innerHTML = `<div class="user-bubble">${escHtml(text)}</div>`;
        chatBody.appendChild(row);
        scrollBottom();
    }

    // ── Typing indicator ──
    function showTyping() {
        const wrap = document.createElement("div");
        wrap.className = "typing-wrap";
        wrap.id = "typingWrap";
        wrap.innerHTML = `
            <div class="msg-avatar">🌿</div>
            <div class="typing-dots"><span></span><span></span><span></span></div>`;
        chatBody.appendChild(wrap);
        scrollBottom();
    }

    function removeTyping() {
        const el = document.getElementById("typingWrap");
        if (el) el.remove();
    }

    // ── Get condition display info from user's text ──
    function getMeta(text) {
        const lower = text.toLowerCase();
        for (const key of Object.keys(conditionMeta)) {
            if (lower.includes(key)) return conditionMeta[key];
        }
        return { name: "Home Remedy", emoji: "🌿" };
    }

    // ── Append bot response ──
    function appendBot(data, userText) {
        const row = document.createElement("div");
        row.className = "msg-row bot";

        const isRemedy    = data.reply.includes("Nani ke Nushke says");
        const isEmergency = data.reply.includes("🚨");

        let innerHtml = "";

        if (isEmergency) {
            // Emergency: red border bubble
            innerHtml = `
                <div class="msg-avatar">🌿</div>
                <div class="emergency-bubble">${data.reply}</div>`;

        } else if (isRemedy) {
            // Remedy: structured card
            const meta = getMeta(userText);

            // Pull remedy text out (between <strong> tags)
            const remMatch  = data.reply.match(/<strong>([\s\S]*?)<\/strong>/);
            const remedyTxt = remMatch ? remMatch[1] : data.reply;

            // Pull red-flag question and action
            const rfqMatch = data.reply.match(/🔔 Quick check: (.*?)<\/em>/);
            const rfaMatch = data.reply.match(/If yes → ([\s\S]*?)(<\/em>|$)/);
            const rfQ = rfqMatch ? rfqMatch[1] : "";
            const rfA = rfaMatch ? rfaMatch[1].replace(/<[^>]+>/g,"") : "";

            innerHtml = `
                <div class="msg-avatar">🌿</div>
                <div class="remedy-card">
                    <div class="card-header">
                        <div class="card-emoji">${meta.emoji}</div>
                        <div>
                            <div class="card-label">Home Remedy</div>
                            <div class="card-title">${meta.name}</div>
                        </div>
                    </div>
                    <div class="card-body">${remedyTxt}</div>
                    ${rfQ ? `
                    <div class="card-redflag">
                        <div class="rf-title">⚠️ When to see a doctor:</div>
                        ${rfQ} ${rfA}
                    </div>` : ""}
                </div>`;

        } else {
            // Plain conversational response
            innerHtml = `
                <div class="msg-avatar">🌿</div>
                <div class="plain-bubble">${data.reply}</div>`;
        }

        row.innerHTML = innerHtml;
        chatBody.appendChild(row);
        scrollBottom();
    }

    // ── Core send ──
    async function send(text) {
        if (!text.trim()) return;
        appendUser(text);
        document.getElementById("userInput").value = "";
        document.getElementById("userInput").disabled = true;
        document.getElementById("sendBtn").disabled = true;
        showTyping();

        try {
            const res  = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text, state: conversationState })
            });
            const data = await res.json();
            conversationState = data.new_state;

            setTimeout(() => {
                removeTyping();
                appendBot(data, text);
                document.getElementById("userInput").disabled = false;
                document.getElementById("sendBtn").disabled = false;
                document.getElementById("userInput").focus();
            }, 650);

        } catch (e) {
            setTimeout(() => {
                removeTyping();
                const row = document.createElement("div");
                row.className = "msg-row bot";
                row.innerHTML = `<div class="msg-avatar">🌿</div>
                    <div class="plain-bubble">⚠️ Could not connect. Please make sure the Flask server is running.</div>`;
                chatBody.appendChild(row);
                scrollBottom();
                document.getElementById("userInput").disabled = false;
                document.getElementById("sendBtn").disabled = false;
            }, 500);
        }
    }

    function sendMessage() { send(document.getElementById("userInput").value.trim()); }
    function sendChip(btn) { send(btn.textContent.trim()); }

    document.getElementById("userInput").addEventListener("keydown", e => {
        if (e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>
